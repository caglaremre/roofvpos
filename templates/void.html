<!-- void canvas -->
<div class="offcanvas offcanvas-bottom" tabindex="-1" id="voidoffcanvas">
	<div class="offcanvas-header">
		<h5 class="offcanvas-title">void</h5>
		<button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
	</div>
	<div class="offcanvas-body container">
		<form action="/void" method="post">
			<table class="table align-middle table-borderless table-sm text-start">
				<tr>
					<td>
						<div class="input-group"><label for="void-process-id" class="input-group-text">process id</label>
							<input type="text" class="form-control" id="void-process-id" name="void-process-id">
						</div>
					</td>
				</tr>
				<tr>
					<td>
						<div class="input-group"><label for="void-order-id" class="input-group-text">order id</label>
							<input type="text" class="form-control" id="void-order-id" name="void-order-id">
						</div>
					</td>
				</tr>
				<tr>
					<td>
						<div class="input-group"><label for="void-lang" class="input-group-text">lang</label>
							<input type="text" class="form-control" id="void-lang" name="void-lang" value="tr">
						</div>
					</td>
				</tr>
				<tr>
					<td>
						<div class="input-group"><label for="void-additional-info" class="input-group-text">additional info</label>
							<input type="text" class="form-control" id="void-additional-info" name="void-additional-info">
						</div>
					</td>
				</tr>
				<tr>
					<td>
						<div class="input-group"><label for="void-invoice-info" class="input-group-text">invoice info</label>
							<input type="text" class="form-control" id="void-invoice-info" name="void-invoice-info">
						</div>
					</td>
				</tr>
				<tr>
					<td colspan="2" class="text-center">
						<input type="submit" class="btn btn-primary" value="submit">
					</td>
				</tr>
			</table>
		</form>
	</div>
</div>
