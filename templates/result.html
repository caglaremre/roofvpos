{{template "header.html" }}
<div class="flex flex-col justify-center text-center items-center gap-2">
	<span class="text-bold text-6xl pt-10" id="timer-text"></span>

	<progress class="progress progress-primary h-12" id="progressbar" value="100" max="100"></progress>

	<div>
		{{if (gt .state 0 )}}
		<div class="alert alert-success">
			<span class="text-3xl text-center">success</span>
		</div>
		{{else}}
		<div class="alert alert-error text-3xl text-center">
			fail
		</div>
		{{end}}
	</div>
	<div class="mockup-code text-justify">
		<pre><code class="language-json">{{.result}}</code></pre>
	</div>
</div>
<script>
	let timer;
	let timeLeft = 5.0;
	let isPaused = false;
	const totalSeconds = 5.0;

	const progressBar = document.getElementById('progressbar');
	const timerText = document.getElementById('timer-text');
	const pauseBtn = document.getElementById('pause-btn');

	function startTimer() {
		// Clear any existing intervals before starting a new one
		clearInterval(timer);

		timer = setInterval(() => {
			if (!isPaused) {
				timeLeft -= 0.1;
				let percentage = (timeLeft / totalSeconds) * 100;

				if (timeLeft < 0) {
					clearInterval(timer);
					progressBar.style.width = '0%';
					timerText.innerText = "goodbye!";
					window.location.replace("/")
				} else {
					progressBar.style.width = percentage + '%';
					timerText.innerText = `${timeLeft.toFixed(1)}s`;
				}
			}
		}, 100);
	}

	// Toggle Pause/Resume
	progressBar.addEventListener('click', () => {
		isPaused = !isPaused;
		if (isPaused) {
			progressBar.classList.remove('progress-bar-animated'); // Stop visual pulse
		} else {
			progressBar.classList.add('progress-bar-animated'); // Resume visual pulse
		}
	});

	// Start automatically on page load
	window.addEventListener('DOMContentLoaded', startTimer);
</script>
{{template "footer.html" }}
