{{template "header.html" }}
<div class="container mt-5">
	<h3 id="timer-text">Time Remaining: 10s</h3>
	<div class="progress" style="height: 3vw;">
		<div
				id="reverse-bar"
				class="progress-bar progress-bar-striped progress-bar-animated"
				role="progressbar"
				style="width: 100%;"
				aria-valuenow="100"
				aria-valuemin="0"
				aria-valuemax="100">
			<div class="btn-group opacity-0">
				<button id="pause-btn" class="btn btn-warning">pause</button>
			</div>
		</div>

	</div>
	<div class="mt-3">
		{{if (gt .state 0 )}}
	<div class="alert alert-success h1" role="alert">
		success
	</div>
		{{else}}
	<div class="alert alert-danger h1" role="alert">
		fail
	</div>
		{{end}}
	</div>
	<pre><code class="language-json">{{.result}}</code></pre>
</div>
<script>
	let timer;
	let timeLeft = 5.0;
	let isPaused = false;
	const totalSeconds = 5.0;

	const progressBar = document.getElementById('reverse-bar');
	const timerText = document.getElementById('timer-text');
	const pauseBtn = document.getElementById('pause-btn');

	function startTimer() {
		// Clear any existing intervals before starting a new one
		clearInterval(timer);

		timer = setInterval(() => {
			if (!isPaused) {
				timeLeft -= 0.1;
				let percentage = (timeLeft / totalSeconds) * 100;

				if (timeLeft < 0) {
					window.location.replace("/")
					clearInterval(timer);
					progressBar.style.width = '0%';
					timerText.innerText = "goodbye!";
					progressBar.classList.remove('progress-bar-animated');
				} else {
					progressBar.style.width = percentage + '%';
					timerText.innerText = `${timeLeft.toFixed(1)}s`;
				}
			}
		}, 100);
	}

	// Toggle Pause/Resume
	pauseBtn.addEventListener('click', () => {
		isPaused = !isPaused;
		if (isPaused) {
			pauseBtn.innerText = "resume";
			pauseBtn.classList.replace('btn-warning', 'btn-success');
			progressBar.classList.remove('progress-bar-animated'); // Stop visual pulse
		} else {
			pauseBtn.innerText = "pause";
			pauseBtn.classList.replace('btn-success', 'btn-warning');
			progressBar.classList.add('progress-bar-animated'); // Resume visual pulse
		}
	});

	// Start automatically on page load
	window.addEventListener('DOMContentLoaded', startTimer);
</script>
{{template "footer.html" }}
