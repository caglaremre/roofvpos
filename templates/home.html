{{template "header.html"}}
{{template "config.html" .}}
<!-- transaction buttons start -->
<div class="row mt-4 mb-5" id="transaction">
	<h3>non-secure transactions</h3>
	<div class="list-group list-group-horizontal">
		<button type="button" class="list-group-item flex-fill" data-bs-toggle="offcanvas"
						data-bs-target="#saleoffcanvas">sale
		</button>
		<button type="button" class="list-group-item flex-fill" id="void-offcanvas-button" data-bs-toggle="offcanvas"
						data-bs-target="#voidoffcanvas">void
		</button>
		<button type="button" class="list-group-item flex-fill" id="refund-offcanvas-button" data-bs-toggle="offcanvas"
						data-bs-target="#refundoffcanvas">refund
		</button>
	</div>
	{{template "sale.html" .}}
	{{template "void.html"}}
	{{template "refund.html"}}
</div>
<!-- transaction buttons end -->
{{template "transactions.html" .}}
<script src="/assets/home.js"></script>
{{template "footer.html"}}
