<dialog id="point_modal" class="modal">
  <div class="modal-box border border-primary min-w-2/4">
    <form method="dialog">
      <button class="btn btn-primary btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <p class="text-bold text-3xl text-center" id="modal-title">point</p>
    <div id="model-content">
      <form action="/point" method="post">
        <table class="table table-xs">
          <tr>
            <td>
              <label class="input input-primary input-sm w-full">
                <span class="label text-primary w-1/4">order id</span>
                <input type="text" id="point-order-id" name="point-order-id" value="{{.saleReq.OrderID}}" />
              </label>
            </td>
          </tr>
          <tr>
            <td>
              <label class="input input-primary input-sm w-full">
                <span class="label text-primary w-1/4">card no</span>
                <input type="text" id="point-card-no" name="point-card-no" />
              </label>
            </td>
          </tr>
          <tr>
            <td>
              <label class="input input-primary input-sm w-full">
                <span class="label text-primary w-1/4">expiry</span>
                <input type="text" id="point-expiry" name="point-expiry" />
              </label>
            </td>
          </tr>
          <tr>
            <td>
              <label class="input input-primary input-sm w-full">
                <span class="label text-primary w-1/4">lang</span>
                <input type="text" id="point-lang" name="point-lang" value="tr" />
              </label>
            </td>
          </tr>
          <tr>
            <td>
              <label class="input input-primary input-sm w-full">
                <span class="label text-primary w-1/4">additional info</span>
                <input type="text" id="point-additional-info" name="point-additional-info" />
              </label>
            </td>
          </tr>
          <tr>
            <td>
              <label class="input input-primary input-sm w-full">
                <span class="label text-primary w-1/4">invoice info</span>
                <input type="text" id="point-invoice-info" name="point-invoice-info" />
              </label>
            </td>
          </tr>
          <tr>
            <td class="text-center">
              <input type="submit" class="btn btn-primary" value="submit" />
            </td>
          </tr>
        </table>
      </form>
    </div>
  </div>
</dialog>
